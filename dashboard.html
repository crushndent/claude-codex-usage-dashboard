<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LLM Fuel</title>
<style>
:root{--bg:#0b1020;--panel:#141b2d;--line:#25304a;--text:#f2f5ff;--muted:#8995ae;--good:#57d9a3;--warn:#ffbc5e;--bad:#ff6577}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,#172443 0,var(--bg) 35%);color:var(--text);font:15px system-ui,sans-serif;min-height:100vh}main{max-width:1200px;margin:auto;padding:36px 22px}header{display:flex;justify-content:space-between;align-items:end;margin-bottom:24px}h1{margin:0;font-size:clamp(30px,5vw,54px);letter-spacing:-.05em}header p,.detail{color:var(--muted)}button{background:#202b45;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:15px}.card{background:linear-gradient(145deg,#172139,var(--panel));border:1px solid var(--line);border-radius:16px;padding:20px;min-height:190px;box-shadow:0 12px 30px #0004}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.name{font-size:23px;font-weight:750}.age,.badge{font-size:12px;color:var(--muted)}.badge{border:1px solid var(--line);border-radius:99px;padding:4px 8px}.metrics{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.09em}.value{font-size:35px;font-weight:800;margin:4px 0}.bar{height:7px;background:#27314a;border-radius:10px;overflow:hidden}.bar i{display:block;height:100%;background:var(--good);border-radius:10px}.reset{font-size:11px;color:var(--muted);margin-top:7px}.balance{font-size:48px;font-weight:850;margin:28px 0 3px}.unavailable{color:var(--warn);font-size:19px;margin:30px 0 10px}.foot{margin-top:24px;color:var(--muted);font-size:12px}@media(max-width:500px){header{align-items:start;gap:18px}.grid{grid-template-columns:1fr}.metrics{gap:9px}}
.account{color:var(--muted);font-size:13px;margin-top:3px}
.titlebar{position:fixed;inset:0 auto 0 0;width:64px;border-right:1px solid var(--line);background:#0c1324;display:flex;align-items:center;justify-content:center;z-index:2}.titlebar h1{font-size:28px;letter-spacing:.08em;white-space:nowrap;transform:rotate(-90deg)}main{max-width:none;height:100vh;margin-left:64px;padding:10px 14px;display:flex;flex-direction:column}header{flex:0 0 auto;margin:0 0 7px;align-items:center}header p{margin:0;font-size:clamp(14px,1.2vw,17px)}.grid{flex:1;min-height:0;grid-template-columns:repeat(4,minmax(220px,1fr));grid-template-rows:repeat(2,minmax(0,1fr));gap:clamp(9px,.8vw,14px)}.card{container-type:inline-size;min-height:0;padding:clamp(14px,1.25vw,20px);border-radius:14px;overflow:hidden}.name{font-size:clamp(22px,7cqi,29px)}.account{font-size:clamp(12px,3.7cqi,15px);line-height:1.25}.metrics{margin-top:clamp(10px,1.2vh,16px);gap:clamp(8px,3cqi,15px)}.label{font-size:clamp(12px,3.7cqi,15px)}.value{font-size:clamp(36px,13cqi,54px)}.reset{font-size:clamp(11px,3.4cqi,14px);margin-top:5px}.balance{font-size:clamp(44px,15cqi,60px);margin:clamp(16px,2vh,24px) 0 3px}.unavailable{font-size:clamp(18px,5.5cqi,23px);margin:clamp(15px,2vh,24px) 0 7px}.detail{font-size:clamp(12px,3.5cqi,14px);line-height:1.3}.foot{flex:0 0 auto;margin-top:5px;font-size:12px}
@media(max-width:1050px){.grid{grid-template-columns:repeat(3,minmax(210px,1fr));grid-template-rows:repeat(3,minmax(190px,1fr))}main{height:auto;min-height:100vh}.grid{flex:none}.card{overflow:visible}}
@media(max-width:760px){.titlebar{position:static;width:auto;height:46px;border-right:0;border-bottom:1px solid var(--line)}.titlebar h1{font-size:20px;transform:none}main{margin-left:0;padding:10px;height:auto}.grid{grid-template-columns:repeat(2,minmax(210px,1fr));grid-template-rows:none}}
@media(max-width:500px){.grid{grid-template-columns:1fr}.card{min-height:180px}header{align-items:center}}
</style></head><body><aside class="titlebar"><h1>LLM Fuel</h1></aside><main><header><p>Remaining capacity across your coding agents</p><button id="refresh">Refresh</button></header><div class="grid" id="grid"></div><div class="foot" id="foot">Loading…</div></main>
<script>
const grid=document.querySelector('#grid'),foot=document.querySelector('#foot');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const age=t=>!t?'no data':Math.max(0,Math.floor((Date.now()-t)/60000))+'m old';
const reset=t=>{if(!t)return'reset unknown';const moreThanDay=t-Date.now()>86400000;return'resets '+new Intl.DateTimeFormat('en-US',moreThanDay?{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}:{hour:'numeric',minute:'2-digit'}).format(new Date(t))};
function metric(label,w){if(!w)return `<div><div class="label">${label}</div><div class="value">—</div><div class="reset">not exposed</div></div>`;const n=Math.round(w.remainingPercent),color=n<20?'var(--bad)':n<=50?'var(--warn)':'var(--good)';return `<div><div class="label">${label}</div><div class="value" style="color:${color}">${n}%</div><div class="bar"><i style="width:${n}%;background:${color}"></i></div><div class="reset">${reset(w.resetAt)}</div></div>`}
function card(p){let body;if(p.status==='unavailable')body=`<div class="unavailable">No live balance</div><div class="detail">${esc(p.detail)}</div>`;else if(p.kind==='pools'){body=`<div class="metrics">${p.pools.slice(0,4).map(x=>metric(x.name,x)).join('')}</div>`;if(p.promptCredits)body+=`<div class="detail" style="margin-top:9px">Prompt credits · <strong>${p.promptCredits.remaining.toLocaleString()}</strong>${Number.isFinite(p.promptCredits.monthly)?` of ${p.promptCredits.monthly.toLocaleString()}`:''}</div>`;if(p.aiCredits?.length)body+=`<div class="detail">AI credits · ${p.aiCredits.map(x=>`${esc(x.type)}: <strong>${x.amount.toLocaleString()}</strong>`).join(' · ')}</div>`}else if(p.kind==='quota'){let overage='';if(p.extraUsage){const state=p.extraUsage.enabled?'ON':'OFF';const amount=Number.isFinite(p.extraUsage.remaining)?` · <strong>$${p.extraUsage.remaining.toFixed(2)} remaining</strong>${Number.isFinite(p.extraUsage.monthlyLimit)?` of $${p.extraUsage.monthlyLimit.toFixed(2)} · $${p.extraUsage.used.toFixed(2)} used`:''}`:' · balance unavailable';overage=`<div class="detail" style="margin-top:11px">Extra Usage <strong>${state}</strong>${amount}${p.extraUsage.disabledReason?' · '+esc(p.extraUsage.disabledReason):''}</div>`}else if(p.extraCredits){const state=p.extraCredits.enabled?'ON':'OFF',amount=Number.isFinite(p.extraCredits.balance)?`$${p.extraCredits.balance.toFixed(2)}`:'unavailable';overage=`<div class="detail" style="margin-top:11px">Extra credits <strong>${state}</strong> · <strong>${amount} remaining</strong>${p.extraCredits.limitReached?' · limit reached':''}</div>`}else if(Number.isFinite(p.overageRemaining))overage=`<div class="detail" style="margin-top:11px">Overage credits remaining · <strong>$${p.overageRemaining.toFixed(2)}</strong></div>`;body=`<div class="metrics">${metric('5 hour',p.five)}${metric('Weekly',p.weekly)}</div>${overage}`}else body=`<div class="balance">${p.unit==='USD'?'$':''}${Number(p.remaining).toLocaleString(undefined,{maximumFractionDigits:2})}${p.unit==='USD'?'':' '+esc(p.unit)}</div><div class="detail">remaining ${p.detail?'· '+esc(p.detail):''}</div>`;const warning=p.warning?`<div class="detail" style="margin-top:8px;color:var(--warn)">${esc(p.warning)}</div>`:'';return `<section class="card"><div class="top"><div><div class="name">${esc(p.name)}</div>${p.account?`<div class="account">${esc(p.account)}</div>`:''}</div><div><span class="badge">${p.kind==='quota'||p.kind==='pools'?'quota':'credits'}</span> <span class="age">${age(p.fetchedAt)}</span></div></div>${body}${warning}</section>`}
async function load(){foot.textContent='Refreshing…';try{const r=await fetch('/api/usage',{cache:'no-store'}),d=await r.json();grid.innerHTML=d.providers.map(card).join('');foot.textContent='Last checked '+new Date(d.generatedAt).toLocaleString()+' · live data stays on this machine';clearTimeout(window.timer);window.timer=setTimeout(load,d.refreshMs)}catch(e){foot.textContent='Refresh failed: '+e.message}}
document.querySelector('#refresh').onclick=load;load();
</script></body></html>
